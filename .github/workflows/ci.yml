name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Worker deps (fastapi, redis, …) + fakeredis, so the worker route and
          # registry tests under tests/ actually run here instead of erroring or
          # skipping on a missing import.
          pip install -r apps/worker/requirements-dev.txt

      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          # Scoped to our declared requirements — an env scan would also flag the
          # runner's system pip/setuptools/wheel, which we don't control. Fails on
          # any known advisory; allowlist a specific one with --ignore-vuln <ID>.
          pip-audit -r requirements.txt -r apps/worker/requirements.txt

      - name: Run tests
        # Coverage gate (QUAL-2): measure src/ + the worker app and fail under
        # the current baseline (~71%) so coverage can't regress. Raise the floor
        # as coverage improves.
        run: python -m pytest tests/ -v --cov=src --cov=apps/worker/app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (npm)
        # Blocks on high+ advisories; moderates are reported but don't fail CI.
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
